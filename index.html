<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vocab Defender</title>
    <style>
        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #0b0c10;
            height: 100vh;
            color: white;
            font-family: 'Comic Sans MS', Arial, sans-serif;
            overflow: hidden;
            flex-direction: column;
        }

        #top-controls {
            width: 800px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            color: #c5c6c7;
        }

        select, button, .file-upload-btn, input[type="number"] {
            background-color: #1f2833;
            color: #66fcf1;
            border: 2px solid #45a29e;
            padding: 6px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
            font-family: Arial, sans-serif;
            transition: all 0.2s;
        }

        input[type="number"] {
            width: 60px;
            text-align: center;
            cursor: text;
        }

        input[type="number"]::placeholder {
            color: #66fcf1;
            opacity: 0.7;
        }

        select:focus, button:hover, .file-upload-btn:hover, input[type="number"]:focus {
            background-color: #45a29e;
            color: #0b0c10;
            outline: none;
        }

        input[type="number"]:focus::placeholder {
            color: #0b0c10;
        }

        #ui-container {
            width: 800px;
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: bold;
            color: #66fcf1;
            text-shadow: 0 0 10px #45a29e;
        }

        canvas {
            background: linear-gradient(to bottom, #0b0c10 0%, #1f2833 100%);
            border: 4px solid #45a29e;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(102, 252, 241, 0.3);
            cursor: none; /* Hide cursor for immersion */
        }

        #instructions {
            margin-top: 15px;
            color: #c5c6c7;
            text-align: center;
            font-size: 16px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- Top Control Panel -->
    <div id="top-controls">
        <div class="control-group">
            <label for="speedSelect">Speed:</label>
            <select id="speedSelect">
                <!-- Extremely slow for beginners -->
                <option value="0.2" selected>Slowest</option>
                <option value="0.5">Slow</option>
                <option value="1">Normal</option>
                <option value="1.5">Fast</option>
                <option value="2.5">Extreme</option>
            </select>
        </div>
        <div class="control-group">
            <label for="livesSelect">Lives:</label>
            <select id="livesSelect">
                <option value="3">3</option>
                <option value="5" selected>5</option>
                <option value="10">10</option>
                <option value="99">99</option>
            </select>
        </div>
        <div class="control-group">
            <label for="timeInput">Time (min):</label>
            <input type="number" id="timeInput" min="1" step="1" placeholder="∞">
        </div>
        <div class="control-group">
            <label for="csvUpload" class="file-upload-btn">Import (CSV)</label>
            <input type="file" id="csvUpload" accept=".csv" style="display: none;">
        </div>
        <div class="control-group">
            <button id="restartBtn">Restart</button>
        </div>
    </div>

    <!-- Game Info -->
    <div id="ui-container">
        <div>Score: <span id="score">0</span></div>
        <div>Time: <span id="timerDisplay">∞</span> ⏳</div>
        <div>Lives: <span id="lives">5</span> ❤️</div>
    </div>

    <!-- Game Canvas -->
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <div id="instructions">
        Type the letters on your keyboard to shoot lasers!<br>
        (Make sure your keyboard is set to English)
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const livesElement = document.getElementById('lives');
        const timerElement = document.getElementById('timerDisplay');

        // --- Game State ---
        let score = 0;
        let initialLives = 5;
        let lives = initialLives;
        let gameOver = false;
        let gameTime = 0; 
        let speedMultiplier = 0.2; // Default to 0.2 (slowest)
        let animationId; // For requestAnimationFrame

        // Timer variables
        let isUnlimited = true;
        let timeRemaining = 0; // in milliseconds
        let lastFrameTime = 0;

        // --- Default Vocabulary ---
        let vocabList = [
            { en: 'apple', zh: '蘋果' }, { en: 'dog', zh: '狗' }, { en: 'cat', zh: '貓' },
            { en: 'book', zh: '書本' }, { en: 'sun', zh: '太陽' }, { en: 'moon', zh: '月亮' },
            { en: 'water', zh: '水' }, { en: 'fire', zh: '火' }, { en: 'tree', zh: '樹木' },
            { en: 'bird', zh: '鳥' }, { en: 'fish', zh: '魚' }, { en: 'car', zh: '車子' },
            { en: 'school', zh: '學校' }, { en: 'happy', zh: '快樂' }, { en: 'play', zh: '玩耍' }
        ];

        // --- Import CSV Feature ---
        document.getElementById('csvUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const text = event.target.result;
                const lines = text.split(/\r?\n/);
                const newVocab = [];

                // Read from the second line (skip headers)
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i];
                    if (!line.trim()) continue;

                    const cols = line.split(',');
                    // Ensure at least word (col 0) and hint (col 2) exist
                    if (cols.length >= 3) {
                        const en = cols[0].trim().toLowerCase();
                        const zh = cols[2].trim();
                        // Ensure english field is not empty
                        if (en && zh) {
                            newVocab.push({ en: en, zh: zh });
                        }
                    }
                }

                if (newVocab.length > 0) {
                    vocabList = newVocab;
                    alert(`Successfully imported ${newVocab.length} words! Game will restart now.`);
                    resetGame();
                } else {
                    alert('Import failed. Please check if the CSV format is correct.');
                }
                
                // Reset input value to allow importing the same file again
                document.getElementById('csvUpload').value = '';
            };
            reader.readAsText(file);
        });

        // --- Selectors/Inputs ---
        document.getElementById('speedSelect').addEventListener('change', (e) => {
            speedMultiplier = parseFloat(e.target.value);
        });

        document.getElementById('livesSelect').addEventListener('change', (e) => {
            initialLives = parseInt(e.target.value);
            resetGame(); // Restart game to apply new lives immediately
        });

        document.getElementById('timeInput').addEventListener('change', () => {
            resetGame(); // Restart game to apply the newly selected time limit
        });

        document.getElementById('restartBtn').addEventListener('click', () => {
            resetGame();
        });


        // --- Object Arrays ---
        let activeWords = [];
        let particles = [];
        let lasers = [];
        let stars = [];
        let targetedWord = null;

        // Initialize background stars
        for (let i = 0; i < 100; i++) {
            stars.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5 + 0.1
            });
        }

        // --- Class Definitions ---
        class FallingWord {
            constructor() {
                const randomVocab = vocabList[Math.floor(Math.random() * vocabList.length)];
                this.text = randomVocab.en;
                this.zh = randomVocab.zh;
                this.x = Math.random() * (canvas.width - 200) + 100; 
                this.y = -50;
                
                // Adjust falling speed based on multiplier.
                const baseSpeed = 0.5 * speedMultiplier;
                const timeFactor = (gameTime / 150000) * speedMultiplier;
                const randomFactor = Math.random() * 0.5 * speedMultiplier;
                // Minimum speed constraint so it doesn't completely stop
                this.speed = Math.max(baseSpeed + timeFactor + randomFactor, 0.1);
                
                this.typedIndex = 0;
                
                ctx.font = 'bold 28px Courier New';
                this.width = ctx.measureText(this.text).width;
            }

            draw() {
                const isTargeted = targetedWord === this;
                const opacity = (targetedWord && !isTargeted) ? 0.3 : 1;

                ctx.save();
                ctx.globalAlpha = opacity;

                ctx.fillStyle = 'rgba(31, 40, 51, 0.8)';
                ctx.beginPath();
                ctx.roundRect(this.x - 20, this.y - 45, this.width + 40, 60, 10);
                ctx.fill();
                ctx.strokeStyle = '#45a29e';
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.fillStyle = '#c5c6c7';
                // Using fonts that support Chinese characters
                ctx.font = '18px "Microsoft JhengHei", Arial, sans-serif'; 
                ctx.textAlign = 'center';
                ctx.fillText(this.zh, this.x + this.width / 2, this.y - 20);

                ctx.font = 'bold 28px Courier New';
                ctx.textAlign = 'left';
                const typedPart = this.text.substring(0, this.typedIndex);
                const untypedPart = this.text.substring(this.typedIndex);

                ctx.fillStyle = '#66fcf1'; 
                ctx.fillText(typedPart, this.x, this.y + 5);
                
                const typedWidth = ctx.measureText(typedPart).width;
                ctx.fillStyle = '#ffffff'; 
                ctx.fillText(untypedPart, this.x + typedWidth, this.y + 5);

                ctx.restore();
            }

            update() {
                this.y += this.speed;
            }
        }

        class Particle {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.life = 1;
                this.color = color;
                this.size = Math.random() * 5 + 2;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life -= 0.05;
                this.size *= 0.95;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        class Laser {
            constructor(targetX, targetY) {
                this.x = canvas.width / 2;
                this.y = canvas.height;
                this.targetX = targetX;
                this.targetY = targetY;
                this.life = 1;
            }
            update() {
                this.life -= 0.1;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.strokeStyle = '#66fcf1';
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(this.targetX, this.targetY);
                ctx.stroke();
                ctx.restore();
            }
        }

        // --- Helper Functions ---
        function createExplosion(x, y) {
            for (let i = 0; i < 20; i++) {
                particles.push(new Particle(x, y, '#66fcf1'));
                particles.push(new Particle(x, y, '#e94560'));
            }
        }

        function drawPlayerBase() {
            ctx.fillStyle = '#1f2833';
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height, 40, Math.PI, 0);
            ctx.fill();
            ctx.strokeStyle = '#45a29e';
            ctx.lineWidth = 3;
            ctx.stroke();
            
            ctx.fillStyle = '#66fcf1';
            ctx.fillRect(canvas.width / 2 - 10, canvas.height - 50, 20, 30);
        }

        function drawBackground() {
            ctx.fillStyle = '#ffffff';
            stars.forEach(star => {
                ctx.globalAlpha = Math.random() * 0.5 + 0.5; 
                ctx.beginPath();
                ctx.arc(star.x, star.y, star.size, 0, Math.PI * 2);
                ctx.fill();
                star.y += star.speed;
                if (star.y > canvas.height) {
                    star.y = 0;
                    star.x = Math.random() * canvas.width;
                }
            });
            ctx.globalAlpha = 1;
        }

        function updateTimerDisplay() {
            if (isUnlimited) {
                timerElement.innerText = '∞';
            } else {
                const totalSeconds = Math.max(0, Math.ceil(timeRemaining / 1000));
                const minutes = Math.floor(totalSeconds / 60);
                const seconds = totalSeconds % 60;
                timerElement.innerText = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            }
        }

        let lastSpawnTime = 0;

        function resetGame() {
            cancelAnimationFrame(animationId);
            score = 0;
            lives = initialLives;
            gameTime = 0;
            gameOver = false;
            activeWords = [];
            particles = [];
            lasers = [];
            targetedWord = null;
            lastFrameTime = 0;
            
            // Setup Timer
            const timeValue = parseFloat(document.getElementById('timeInput').value);
            if (!isNaN(timeValue) && timeValue > 0) {
                isUnlimited = false;
                timeRemaining = timeValue * 60 * 1000;
            } else {
                isUnlimited = true;
                timeRemaining = 0;
            }
            updateTimerDisplay();
            
            scoreElement.innerText = score;
            livesElement.innerText = lives;

            animationId = requestAnimationFrame(gameLoop);
        }

        function endGame(isTimeUp = false) {
            gameOver = true;
            ctx.fillStyle = 'rgba(0, 0, 0, 0.8)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.fillStyle = isTimeUp ? '#66fcf1' : '#e94560';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            const endMessage = isTimeUp ? 'TIME IS UP!' : 'GAME OVER';
            ctx.fillText(endMessage, canvas.width / 2, canvas.height / 2 - 20);
            
            ctx.fillStyle = '#ffffff';
            ctx.font = '24px Arial';
            ctx.fillText(`Final Score: ${score}`, canvas.width / 2, canvas.height / 2 + 30);
            ctx.fillText('Click [Restart] above to play again!', canvas.width / 2, canvas.height / 2 + 70);
        }

        // --- Game Loop ---
        function gameLoop(timestamp) {
            if (gameOver) return;

            if (!lastFrameTime) lastFrameTime = timestamp;
            const deltaTime = timestamp - lastFrameTime;
            lastFrameTime = timestamp;

            gameTime += deltaTime; 
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            drawBackground();

            // Timer countdown
            if (!isUnlimited) {
                timeRemaining -= deltaTime;
                updateTimerDisplay();
                
                if (timeRemaining <= 0) {
                    timeRemaining = 0;
                    updateTimerDisplay();
                    endGame(true); // true indicates end caused by time out
                    return;
                }
            }

            // More balanced spawn interval that doesn't get ridiculously long on slow speeds
            let spawnInterval = 1500 + (1 / speedMultiplier) * 800;

            if (timestamp - lastSpawnTime > spawnInterval || activeWords.length === 0) {
                activeWords.push(new FallingWord());
                lastSpawnTime = timestamp;
            }

            for (let i = activeWords.length - 1; i >= 0; i--) {
                let word = activeWords[i];
                word.update();
                word.draw();

                // Bottom collision (lose life)
                if (word.y > canvas.height + 50) {
                    activeWords.splice(i, 1);
                    if (targetedWord === word) targetedWord = null;
                    
                    lives--;
                    livesElement.innerText = lives;
                    
                    ctx.fillStyle = 'rgba(233, 69, 96, 0.3)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);

                    if (lives <= 0) {
                        endGame(false);
                        return; // Exit current loop when game is over
                    }
                }
            }

            for (let i = particles.length - 1; i >= 0; i--) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].life <= 0) particles.splice(i, 1);
            }

            for (let i = lasers.length - 1; i >= 0; i--) {
                lasers[i].update();
                lasers[i].draw();
                if (lasers[i].life <= 0) lasers.splice(i, 1);
            }

            drawPlayerBase();

            animationId = requestAnimationFrame(gameLoop);
        }

        // --- Input Listeners ---
        window.addEventListener('keydown', (e) => {
            if (gameOver) return;
            
            if (e.key.length !== 1 || !/[a-zA-Z\-]/.test(e.key)) return;

            const key = e.key.toLowerCase();
            
            if (targetedWord) {
                if (key === targetedWord.text[targetedWord.typedIndex]) {
                    targetedWord.typedIndex++;
                    
                    if (targetedWord.typedIndex === targetedWord.text.length) {
                        const targetX = targetedWord.x + targetedWord.width / 2;
                        const targetY = targetedWord.y;

                        lasers.push(new Laser(targetX, targetY));
                        createExplosion(targetX, targetY);

                        activeWords = activeWords.filter(w => w !== targetedWord);
                        targetedWord = null;
                        score += 10;
                        scoreElement.innerText = score;
                    }
                } else {
                    targetedWord.x += (Math.random() > 0.5 ? 5 : -5); 
                }
                return;
            }

            for (let word of activeWords) {
                if (key === word.text[0]) {
                    targetedWord = word;
                    targetedWord.typedIndex = 1;
                    break;
                }
            }
        });

        // --- Auto-Load Default CSV ---
        async function loadDefaultVocabulary() {
            try {
                const response = await fetch('cambridge_vocab-starter.csv');
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                const text = await response.text();
                const lines = text.split(/\r?\n/);
                const newVocab = [];

                // Read from the second line (skip headers)
                for (let i = 1; i < lines.length; i++) {
                    const line = lines[i];
                    if (!line.trim()) continue;

                    const cols = line.split(',');
                    if (cols.length >= 3) {
                        const en = cols[0].trim().toLowerCase();
                        const zh = cols[2].trim();
                        if (en && zh) {
                            newVocab.push({ en: en, zh: zh });
                        }
                    }
                }

                if (newVocab.length > 0) {
                    vocabList = newVocab;
                    console.log(`Successfully loaded ${newVocab.length} words from cambridge_vocab-starter.csv`);
                    resetGame(); // Restart to apply the new list immediately
                }
            } catch (error) {
                console.warn("Could not load default CSV (Make sure you are running a local server like Live Server, or hosted on GitHub Pages). Using fallback vocabulary.", error);
            }
        }

        // Start Game
        // We set lastSpawnTime to -9999 so the first frame triggers a word drop instantly
        lastSpawnTime = -9999;
        
        // Attempt to load the CSV first. Once done (or failed), start the game loop.
        loadDefaultVocabulary().finally(() => {
            animationId = requestAnimationFrame(gameLoop);
        });

    </script>
</body>
</html>
